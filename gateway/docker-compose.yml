services:
  clawcam-gateway:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - ../schemas:/schemas:ro
      - clawcam-data:/data
    environment:
      CLAWCAM_DB: /data/clawcam_gateway.db
      CLAWCAM_MEDIA_DIR: /data/media
      CLAWCAM_HOST: 0.0.0.0
      CLAWCAM_PORT: "8080"
    command: >
      sh -c "pip install fastapi uvicorn pydantic jsonschema && PYTHONPATH=/app uvicorn clawcam_gateway.api.app:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"

volumes:
  clawcam-data:
